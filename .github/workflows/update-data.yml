name: Update Stock Data
 
# Wanneer wordt deze workflow uitgevoerd?
on:
  # Elke maandag om 06:00 UTC (= 07:00 NL wintertijd / 08:00 zomertijd)
  schedule:
    - cron: '0 6 * * 1'
  # Ook handmatig te starten via de Actions tab op GitHub
  workflow_dispatch:
 
jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Nodig om data terug te kunnen pushen
 
    steps:
      # Stap 1: Code uit de repo halen
      - name: Checkout repository
        uses: actions/checkout@v4
 
      # Stap 2: Python installeren
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      # Stap 3: Dependencies installeren
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      # Stap 4: Pipeline draaien
      - name: Run data pipeline
        run: python data_pipeline.py
 
      # Stap 5: Wijzigingen committen en pushen (alleen als er iets veranderd is)
      - name: Commit and push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          if git diff --cached --quiet; then
            echo "Geen nieuwe data om te committen"
          else
            git commit -m "Auto-update data $(date +'%Y-%m-%d')"
            git push
          fi
